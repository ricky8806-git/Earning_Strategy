name: PEAD Live Analysis (self-hosted)

# Runs on YOUR local Windows machine via a self-hosted runner so Yahoo Finance
# is not IP-blocked. Generates run_plan.json and pushes it to git.
# The cloud PEAD Live execution agent then reads the plan and trades on Robinhood.

on:
  schedule:
    # 7:00 AM PST = 15:00 UTC (standard time Nov–Mar)
    - cron: '0 15 * * 1-5'
    # 7:00 AM PDT = 14:00 UTC (daylight time Mar–Nov)
    - cron: '0 14 * * 1-5'
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: self-hosted
    concurrency:
      group: pead-live-analysis
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 5

      - name: Locate Python
        shell: powershell
        run: |
          # Prefer python/py already in PATH
          $pyExe = $null
          foreach ($cmd in @('python','py')) {
            try {
              $p = (Get-Command $cmd -ErrorAction Stop).Source
              & $p --version 2>&1 | Out-Null
              $pyExe = $p; break
            } catch {}
          }
          # Fall back: search all user profiles and Program Files
          if (-not $pyExe) {
            $searchRoots = @('C:\Users','C:\Program Files','C:\Program Files (x86)')
            foreach ($root in $searchRoots) {
              $hit = Get-ChildItem $root -Recurse -Filter 'python.exe' -ErrorAction SilentlyContinue |
                     Where-Object { $_.DirectoryName -notmatch '\\Scripts' } |
                     Select-Object -First 1
              if ($hit) { $pyExe = $hit.FullName; break }
            }
          }
          if (-not $pyExe) {
            Write-Host "##[error]Python not found. Fix: in services.msc set the runner service Log On account to your Windows user, then restart the service."
            exit 1
          }
          Write-Host "Using Python: $pyExe"
          Add-Content $env:GITHUB_ENV "PYTHON_EXE=$pyExe"

      - name: Install dependencies
        shell: powershell
        run: '& "$env:PYTHON_EXE" -m pip install -r pead_live/requirements.txt -q'

      - name: Run analysis
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: '& "$env:PYTHON_EXE" pead_live/analysis.py'
