name: PEAD Live Analysis (self-hosted)

# Runs on YOUR local Windows machine via a self-hosted runner so Yahoo Finance
# is not IP-blocked. Generates run_plan.json and pushes it to git.
# The cloud PEAD Live execution agent then reads the plan and trades on Robinhood.

on:
  schedule:
    # 7:00 AM PST = 15:00 UTC (standard time Nov–Mar)
    - cron: '0 15 * * 1-5'
    # 7:00 AM PDT = 14:00 UTC (daylight time Mar–Nov)
    - cron: '0 14 * * 1-5'
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: self-hosted
    concurrency:
      group: pead-live-analysis
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 5

      - name: Guard — skip if already ran today
        id: guard
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            Write-Output "Manual dispatch — skipping guard"
            echo "skip=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $last = git log -1 --format="%cd" --date=format:"%Y-%m-%d" -- pead_live/run_plan.json 2>$null
          $today = (Get-Date -AsUTC).ToString("yyyy-MM-dd")
          Write-Output "run_plan.json last commit: $last  |  Today (UTC): $today"
          if ($last -eq $today) {
            Write-Output "Analysis already ran today — skipping duplicate trigger."
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        shell: pwsh
        run: python -m pip install -r pead_live/requirements.txt -q

      - name: Run analysis
        if: steps.guard.outputs.skip != 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python pead_live/analysis.py
