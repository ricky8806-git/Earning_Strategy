name: PEAD Live Analysis (self-hosted)

# Runs on YOUR local Windows machine via a self-hosted runner so Yahoo Finance
# is not IP-blocked. Generates run_plan.json and pushes it to git.
# The cloud PEAD Live execution agent then reads the plan and trades on Robinhood.

on:
  schedule:
    # 6:30 AM PST = 14:30 UTC (standard time Nov–Mar)
    # Runs 30 min before the 7am ET execution session so run_plan.json is ready
    - cron: '30 14 * * 1-5'
    # 6:30 AM PDT = 13:30 UTC (daylight time Mar–Nov)
    - cron: '30 13 * * 1-5'
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: self-hosted
    concurrency:
      group: pead-live-analysis
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 5

      - name: Locate Python
        shell: powershell
        run: |
          # Try PATH first (works if runner runs as user or system PATH includes Python)
          $pyExe = $null
          foreach ($cmd in @('python','py')) {
            try {
              $p = (Get-Command $cmd -ErrorAction Stop).Source
              & $p --version 2>&1 | Out-Null
              $pyExe = $p; break
            } catch {}
          }
          # Fall back: try known per-user install path for ricky on this machine
          if (-not $pyExe) {
            $candidates = @(
              'C:\Users\ricky\AppData\Local\Programs\Python\Python312\python.exe',
              'C:\Users\ricky\AppData\Local\Programs\Python\Python311\python.exe',
              'C:\Users\ricky\AppData\Local\Programs\Python\Python310\python.exe',
              'C:\Users\ricky\AppData\Local\Programs\Python\Python39\python.exe',
              'C:\Program Files\Python312\python.exe',
              'C:\Program Files\Python311\python.exe',
              'C:\Program Files\Python310\python.exe'
            )
            foreach ($c in $candidates) {
              if (Test-Path $c) { $pyExe = $c; break }
            }
          }
          if (-not $pyExe) {
            Write-Host "##[error]Python not found. Reinstall Python choosing 'Install for all users', or change runner service Log On to your Windows user account."
            exit 1
          }
          Write-Host "Using Python: $pyExe"
          Add-Content $env:GITHUB_ENV "PYTHON_EXE=$pyExe"

      - name: Install dependencies
        shell: powershell
        run: '& "$env:PYTHON_EXE" -m pip install -r pead_live/requirements.txt -q'

      - name: Run analysis
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: '& "$env:PYTHON_EXE" pead_live/analysis.py'
