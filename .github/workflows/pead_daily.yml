name: PEAD Daily Run

on:
  schedule:
    # 9:31 AM ET — 13:31 UTC (EDT, Mar–Nov) and 14:31 UTC (EST, Nov–Mar)
    # Running both so the trigger is correct year-round
    - cron: '31 13 * * 1-5'
    - cron: '31 14 * * 1-5'
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    # Prevent both cron entries from racing each other during the overlap window
    concurrency:
      group: pead-daily
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push inside main.py can write back to main
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pead_strategy/requirements.txt

      - name: Install dependencies
        run: pip install -r pead_strategy/requirements.txt -q

      - name: Run PEAD strategy
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GH_PAT }}
        working-directory: pead_strategy
        run: python main.py 2>&1 | tee ../pead_run.log; exit ${PIPESTATUS[0]}

      - name: Upload logs as artifact (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pead-logs-${{ github.run_id }}
          path: |
            pead_strategy/state.json
            pead_strategy/trades_log.csv
            pead_run.log
          retention-days: 90
